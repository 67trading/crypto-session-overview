services:
  postgres:
    image: postgres:16-alpine
    container_name: pre-session-crypto-brief-postgres
    environment:
      POSTGRES_DB: crypto_session_overview
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_session_overview"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: pre-session-crypto-brief-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crypto:crypto@postgres:5432/crypto_session_overview?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PORT: ${PORT:-3100}
      SESSION_OVERVIEW_API_TOKEN: ${SESSION_OVERVIEW_API_TOKEN:-}
      SESSION_OVERVIEW_TRIGGER_RATE_LIMIT_MAX: ${SESSION_OVERVIEW_TRIGGER_RATE_LIMIT_MAX:-5}
      SESSION_OVERVIEW_TRIGGER_RATE_LIMIT_WINDOW_MS: ${SESSION_OVERVIEW_TRIGGER_RATE_LIMIT_WINDOW_MS:-600000}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Europe/Berlin}
      SCHEDULER_CRON_ASIA: ${SCHEDULER_CRON_ASIA:-30 1 * * *}
      SCHEDULER_CRON_EUROPE: ${SCHEDULER_CRON_EUROPE:-30 8 * * *}
      SCHEDULER_CRON_US: ${SCHEDULER_CRON_US:-0 15 * * *}
      BYBIT_BASE_URL: ${BYBIT_BASE_URL:-https://api.bybit.com}
      FRED_API_KEY: ${FRED_API_KEY:-}
      BEA_API_KEY: ${BEA_API_KEY:-}
      MOBULA_API_KEY: ${MOBULA_API_KEY:-}
      COINMARKETCAL_API_KEY: ${COINMARKETCAL_API_KEY:-}
    ports:
      - "3100:3100"

volumes:
  postgres_data:
